name: ACI

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: "Get Short SHA"
      run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: "Get Version"
      run: echo "VERSION=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')" >> $GITHUB_ENV

    - name: "Generate Changelog"
      run: |
        git remote add upstream https://github.com/Pipetto-crypto/winlator.git || true
        git fetch upstream winlator_bionic || true

        echo "CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "## Upstream (Pipetto) Latest Commits" >> $GITHUB_ENV
        git log --pretty=format:"- %s" upstream/winlator_bionic -1 >> $GITHUB_ENV
        echo "" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/CMoD-AnTuTu.apk

    - name: Attach release in action
      uses: actions/upload-artifact@v4
      with:
       name: CMoD-AnTuTu-${{ env.VERSION }}
       path: ./app/build/outputs/apk/debug/CMoD-AnTuTu.apk

#    - name: Create Release
#      uses: softprops/action-gh-release@v2
#      with:
#        tag_name: v${{ env.VERSION }}-${{ env.SHORT_SHA }}
#        name: "CMoD-AnTuTu"
#        body: ${{ env.CHANGELOG }}
#        files: ./app/build/outputs/apk/debug/CMoD-AnTuTu.apk
#      env:
#        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: "List files"
      run: |
        ls -la app/src/main/assets
