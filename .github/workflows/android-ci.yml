name: Android CI

on:
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  APK_NAME: "CMoD-AnTuTu"

jobs:
  build:
    name: Build APK
    
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Extract Build Metadata
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "VERSION=$(grep versionName app/build.gradle \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/${{ env.APK_NAME }}.apk

      - name: List Output Files
        run: |
          ls -lh app/build/outputs/apk/debug/
          ls -la app/src/main/assets

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-${{ env.VERSION }}-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/debug/${{ env.APK_NAME }}.apk
          
