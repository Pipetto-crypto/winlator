name: Build APK (Winlator Bionic)

on:
  push:
    branches: [ "winlator_bionic" ]
  pull_request:
    branches: [ "winlator_bionic" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK / Build-tools / NDK / CMake
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;35.0.0" \
            "ndk;29.0.14206865" \
            "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: winlator-bionic-debug-apk
          path: path: app/build/outputs/apk/release/*.apk
