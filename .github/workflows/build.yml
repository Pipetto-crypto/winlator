name: Android CI Bionic

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Shader Compiler
      run: sudo apt-get update && sudo apt-get install -y glslang-tools

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Get short SHA
      run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Get versionName
      run: |
        VERSION=$(grep versionName app/build.gradle.kts | cut -d '=' -f2 | tr -d ' "')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Create GitHub Release and upload APK
      uses: softprops/action-gh-release@v1
      with:
        tag_name: debug-${{ github.run_number }}
        name: "Winlator Bionic Debug ${{ github.run_number }}"
        body: |
          Commit: ${{ env.SHORT_SHA }}
          Version: ${{ env.VERSION }}
        files: app/build/outputs/apk/debug/app-debug.apk
