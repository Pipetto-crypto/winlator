name: Cherry Pick Lorie X Server & Compile

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch to cherry-pick from'
        required: true
        default: 'main'

jobs:
  cherry-pick-compile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Xlorie branch
        uses: actions/checkout@v3
        with:
          ref: Xlorie
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Add alexvorxx remote
        run: |
          git remote add alexvorxx https://github.com/alexvorxx/winlator.git
          git fetch alexvorxx

      - name: Cherry-pick Lorie X Server commits
        continue-on-error: true
        run: |
          git cherry-pick b866ec841aefaae82c3412bc989f7b7b0a98816b
          git cherry-pick 757dcf25ba14d2396e032b0413e8e6020566b88d
          git cherry-pick 5c06689bd9935962c1e7a5c99e81d48d3b566ec5
          git cherry-pick a15c4c7e4eba3dc71d6fe00cd9b21ab1fb864de9
          git cherry-pick 5b64eee0120048d7dea72ad6c848d7086ffde4a9

      - name: Resolve conflicts (if any)
        continue-on-error: true
        run: |
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Conflicts detected, attempting automatic resolution..."
            git diff --name-only --diff-filter=U | while read file; do
              git checkout --theirs "$file"
              git add "$file"
            done
            git cherry-pick --continue || echo "Manual intervention needed"
          fi

      - name: Push changes
        run: |
          git push origin Xlorie --force-with-lease

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "lorie-xserver-${{ github.run_number }}"
          body: |
            🚀 **Winlator with Lorie X Server**
            
            ✅ Commits successfully cherry-picked from alexvorxx/winlator
            
            **Integrated features:**
            - Lorie X Server (from MiceWine)
            - Gallium Freedreno OpenGL support
            - Composite extension for X Server
            - Various stability improvements
          draft: false
          prerelease: false
